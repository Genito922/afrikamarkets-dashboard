version: "3.9"

services:

  # ── Streamlit App ─────────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: docker/Dockerfile.streamlit
    ports:
      - "8501:8501"
    environment:
      - DATABASE_URL=postgresql+asyncpg://afrika:${POSTGRES_PASSWORD}@db:5432/afrikamarkets
      - FASTAPI_URL=http://fastapi:8000
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - db
      - fastapi
    volumes:
      - ./translations:/app/translations:ro
      - ./assets:/app/assets:ro
    restart: unless-stopped

  # ── FastAPI Backend ───────────────────────────────────────
  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://afrika:${POSTGRES_PASSWORD}@db:5432/afrikamarkets
      - SECRET_KEY=${SECRET_KEY}
      - LEMON_SQUEEZY_KEY=${LEMON_SQUEEZY_KEY}
    depends_on:
      - db
    restart: unless-stopped

  # ── PostgreSQL ────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: afrika
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: afrikamarkets
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  postgres_data:
